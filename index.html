<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="숫자야구">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>숫자 야구</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navigation">
        <ul>
            <li class="list active" id="menu-game" title="게임">
                <a href="#"><span class="icon"><ion-icon name="game-controller-outline"></ion-icon></span></a>
            </li>
            <li class="list" id="menu-hint" title="힌트 찬스">
                <a href="#"><span class="icon"><ion-icon name="bulb-outline"></ion-icon></span></a>
            </li>
            <li class="list" id="menu-help" title="게임 방법">
                <a href="#"><span class="icon"><ion-icon name="help-circle-outline"></ion-icon></span></a>
            </li>
            <li class="list" id="menu-sound" title="사운드">
                <a href="#"><span class="icon"><ion-icon id="sound-icon-svg" name="volume-high-outline"></ion-icon></span></a>
            </li>
            <div class="indicator"></div>
        </ul>
    </div>

    <div id="screen-mode-select" class="game-container active-screen">
        <h2>⚾ 숫자 야구 게임</h2>
        <p>전 세계 플레이어와 경쟁하세요!</p>
        
        <div class="profile-input-area">
            <input type="text" id="global-nickname" placeholder="사용할 닉네임 (최대 6자)" maxlength="6" autocomplete="off">
        </div>
        
        <button id="btn-single-play" class="mode-btn btn-purple">👤 혼자 하기 (시즌 랭킹)</button>
        <button id="btn-multi-play" class="mode-btn btn-blue">⚔️ 온라인 1:1 대전</button>
    </div>

    <div id="screen-lobby" class="game-container hidden">
        <h2>⚔️ 온라인 대기실</h2>
        <p id="lobby-status" class="highlight-text">상대방을 찾고 있습니다... ⏳</p>
        <div class="loader"></div>
        <button id="btn-cancel-match" class="mode-btn btn-red">취소하고 나가기</button>
    </div>

    <div id="screen-single" class="game-container hidden">
        <div id="pop-effect"></div> 
        
        <h2>👤 싱글 플레이</h2>
        <p>중복되지 않는 3자리 숫자를 맞춰보세요!</p>
        
        <div id="timer-display">⏱ 00:00</div>
        
        <div class="input-area">
            <input type="text" id="user-input" maxlength="3" placeholder="예: 081" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
            <button id="submit-btn">입력</button>
        </div>
        
        <div id="result-board"></div>
        
        <div id="single-end-btns" style="display: none; gap: 10px; margin-bottom: 15px;">
            <button id="retry-btn" class="mode-btn btn-blue" style="margin: 0; flex: 1;">다시 하기</button>
            <button id="home-btn" class="mode-btn btn-red" style="margin: 0; flex: 1;">메인으로</button>
        </div>

        <div id="leaderboard">
            <h3>🏆 시즌 명예의 전당</h3>
            <div id="season-info">
                <div id="season-countdown">⏳ 초기화까지: 계산 중...</div>
                <div id="prev-winner">👑 지난 시즌: 불러오는 중...</div>
            </div>
            <ul id="rank-list"></ul>
        </div>
    </div>

    <div id="screen-multi" class="game-container hidden">
        <div id="multi-pop-effect"></div>
        
        <h2>⚔️ 1:1 대전 모드</h2>
        <div class="versus-header">
            <span id="multi-my-name" class="p-name my-name">나</span>
            <span class="vs-text">VS</span>
            <span id="multi-opp-name" class="p-name opp-name">상대</span>
        </div>
        
        <div id="my-secret-box" class="secret-box hidden">
            🔒 내 비밀 숫자: <strong id="my-secret-number"></strong>
        </div>

        <p id="multi-status-msg" class="highlight-text">상대방이 맞출 내 숫자를 설정하세요!</p>
        
        <div class="input-area">
            <input type="text" id="multi-input" maxlength="3" autocomplete="off" inputmode="numeric" placeholder="숫자 입력">
            <button id="multi-submit-btn">확인</button>
        </div>
        
        <div id="multi-result-board"></div>
        <button id="multi-exit-btn" class="mode-btn btn-red" style="display: none; margin-top: 15px;">대기실로 돌아가기</button>
    </div>

    <div id="name-modal" class="modal hidden">
        <div class="modal-content">
            <h3>🎉 Top 10 달성!</h3>
            <p>기록: <strong id="record-time" style="color:#4caf50;"></strong>초</p>
            <input type="text" id="player-name" placeholder="닉네임 (최대 6자)" maxlength="6">
            <button id="save-name-btn" class="mode-btn btn-green">기록 저장</button>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
